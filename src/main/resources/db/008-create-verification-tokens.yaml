databaseChangeLog:
  - changeSet:
      id: 008-create-verification-tokens
      author: raffo
      changes:
        - createTable:
            tableName: verification_tokens
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: used
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: verification_tokens
            columnNames: token
            constraintName: uq_verification_tokens_token

        - addUniqueConstraint:
            tableName: verification_tokens
            columnNames: user_id
            constraintName: uq_verification_tokens_user_id

        - addForeignKeyConstraint:
            baseTableName: verification_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_verification_tokens_user