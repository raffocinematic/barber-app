databaseChangeLog:
  - changeSet:
      id: 014-create-new-appointments-structure
      author: raffo
      changes:
        - createTable:
            tableName: appointments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: start_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: end_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: duration_minutes
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: appointments
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_appointments_user

        - createTable:
            tableName: appointment_services
            columns:
              - column:
                  name: appointment_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: service_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: appointment_services
            baseColumnNames: appointment_id
            referencedTableName: appointments
            referencedColumnNames: id
            constraintName: fk_appointment_services_appointment

        - addForeignKeyConstraint:
            baseTableName: appointment_services
            baseColumnNames: service_id
            referencedTableName: shop_services
            referencedColumnNames: id
            constraintName: fk_appointment_services_service

        - addPrimaryKey:
            tableName: appointment_services
            columnNames: appointment_id, service_id
            constraintName: pk_appointment_services