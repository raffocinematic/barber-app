databaseChangeLog:
  - changeSet:
      id: 007-alter-users-for-email-auth
      author: raffo
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: email
                  type: VARCHAR(120)

              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: false

              - column:
                  name: email_verified
                  type: BOOLEAN
                  defaultValueBoolean: false

        - addUniqueConstraint:
            tableName: users
            columnNames: email
            constraintName: uq_users_email