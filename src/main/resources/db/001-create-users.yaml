databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: raffo
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(60)
                  constraints:
                    nullable: false

              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: users
            columnNames: username
            constraintName: uq_users_username