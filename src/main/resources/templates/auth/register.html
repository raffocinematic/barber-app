<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrazione - Barber App</title>
    <link rel="stylesheet" th:href="@{css/barber.css}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="brand">
            <div class="brand-badge"><span>BA</span></div>
            <div class="brand-title">
                <div class="name">Barber App</div>
                <div class="tagline">Crea il tuo account</div>
            </div>
        </div>

        <h2>Registrati</h2>



        <form th:action="@{/register}" th:object="${form}" method="post">
            <div class="form-group">
                <label for="username">Nome utente</label>
                <input class="input" id="username" type="text" th:field="*{username}" placeholder="Scegli username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input class="input" id="password" type="password" th:field="*{password}" placeholder="Scegli password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Conferma password</label>
                <input class="input" id="confirmPassword" type="password" th:field="*{confirmPassword}" placeholder="Ripeti password" required>
            </div>

            <button class="btn" type="submit">Registrati</button>
        </form>





        <div class="alert error" th:if="${error}" th:text="${error}"></div>

        <div class="auth-footer">
            Hai già un account? <a th:href="@{/login}">Login</a>
        </div>
    </div>
</div>
</body>
</html>
