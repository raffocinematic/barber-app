<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verifica email</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/barber.css}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <h2>Verifica email</h2>

        <p th:if="${message}" th:text="${message}"></p>
        <p th:if="${error}" th:text="${error}"></p>

        <a th:href="@{/login}" class="btn">Vai al login</a>
    </div>
</div>
</body>
</html>
