<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Barber App</title>
    <link rel="stylesheet" th:href="@{css/barber.css}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="brand">
            <div class="brand-badge"><span>BA</span></div>
            <div class="brand-title">
                <div class="name">Barber App</div>
                <div class="tagline">Prenota il tuo prossimo look</div>
            </div>
        </div>

        <h2>Login</h2>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input class="input" id="username" type="text" name="username" placeholder="Inserisci username"
                       required>

            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input class="input" id="password" type="password" name="password" placeholder="Inserisci password"
                       required>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <button class="btn" type="submit">Accedi</button>
        </form>

        <div class="alert error" th:if="${param.error}">
            Username o password non validi.
        </div>
        <div class="alert success" th:if="${param.registered}">
            Registrazione completata! Ora puoi accedere.
        </div>

        <div class="auth-footer">
            Non hai un account? <a th:href="@{/register}">Registrati</a>
        </div>
    </div>
</div>
</body>
</html>
