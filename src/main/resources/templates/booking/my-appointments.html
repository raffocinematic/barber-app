<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Le mie prenotazioni</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/barber.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar('booking')}"></div>

<div class="page">
    <div class="services-card">

        <h1>Le mie prenotazioni</h1>
        <p class="subtitle">
            Qui puoi vedere tutti gli appuntamenti associati al tuo account.
        </p>

        <div th:if="${appointments == null or appointments.isEmpty()}" class="empty-slots">
            Non hai ancora nessuna prenotazione.
        </div>

        <div th:if="${appointments != null and !appointments.isEmpty()}" class="appointments-list">

            <div th:each="appointment : ${appointments}" class="appointment-card">

                <div class="summary-block">
                    <h3>
                        Prenotazione del
                        <span th:text="${#temporals.format(appointment.startTime, 'dd/MM/yyyy')}"></span>
                    </h3>

                    <p>
                        <strong>Orario:</strong>
                        <span th:text="${#temporals.format(appointment.startTime, 'HH:mm')}"></span>
                        -
                        <span th:text="${#temporals.format(appointment.endTime, 'HH:mm')}"></span>
                    </p>

                    <p>
                        <strong>Durata:</strong>
                        <span th:text="${appointment.durationMinutes}"></span> minuti
                    </p>

                    <p>
                        <strong>Stato:</strong>
                        <span th:text="${appointment.status}"></span>
                    </p>

                    <div class="appointment-services">
                        <strong>Servizi:</strong>
                        <ul class="summary-list">
                            <li th:each="service : ${appointment.services}"
                                th:text="${service.name}"></li>
                        </ul>
                    </div>
                </div>

            </div>

        </div>

        <div class="services-footer">
            <a class="btn" th:href="@{/booking}">Prenota un altro appuntamento</a>
        </div>

    </div>
</div>

</body>
</html>
