<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Scegli lo slot</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/barber.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar('booking')}"></div>

<div class="page">
    <div class="services-card">

        <h1>Scegli uno slot</h1>
        <p class="subtitle">
            Seleziona l’orario disponibile per completare la prenotazione.
        </p>

        <p th:if="${error}" class="form-error" th:text="${error}"></p>

        <form th:action="@{/booking/confirm}" th:object="${form}" method="post">

            <!-- keep services selected in step 1 -->
            <input type="hidden"
                   th:each="serviceId : *{serviceIds}"
                   name="serviceIds"
                   th:value="${serviceId}" />

            <!-- keep selected date from step 2 -->
            <input type="hidden" th:field="*{date}" />

            <div th:if="${slots != null and !slots.isEmpty()}" class="slots-grid">
                <label th:each="slot : ${slots}" class="slot-option">
                    <input type="radio"
                           th:field="*{startTime}"
                           th:value="${slot}"
                           required>
                    <span th:text="${slot}"></span>
                </label>
            </div>

            <div th:if="${slots == null or slots.isEmpty()}" class="empty-slots">
                Nessuno slot disponibile per il giorno selezionato.
            </div>

            <div class="services-footer" th:if="${slots != null and !slots.isEmpty()}">
                <button type="submit" class="btn">Conferma prenotazione</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
